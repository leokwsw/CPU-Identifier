name: Build and Release DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the release (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    # Use macos-13 (Intel) because MobileDevice.framework only supports x86_64
    runs-on: macos-13
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List available schemes
        run: xcodebuild -list -project "CPU Identifier.xcodeproj"

      - name: Build Mac App
        run: |
          xcodebuild \
            -project "CPU Identifier.xcodeproj" \
            -scheme "CPU Identifier Mac" \
            -configuration Release \
            -derivedDataPath build \
            -arch x86_64 \
            ARCHS=x86_64 \
            ONLY_ACTIVE_ARCH=NO \
            MACOSX_DEPLOYMENT_TARGET=10.13 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_OBJCLEAN=1 \
            build

      - name: Find built app
        id: find_app
        run: |
          APP_PATH=$(find build -name "CPU Identifier.app" -type d | head -1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found app at: $APP_PATH"

      - name: Create DMG
        run: |
          # Create a temporary directory for DMG contents
          mkdir -p dmg_contents
          
          # Copy the app to the DMG contents
          cp -R "${{ steps.find_app.outputs.APP_PATH }}" dmg_contents/
          
          # Create a symbolic link to /Applications
          ln -s /Applications dmg_contents/Applications
          
          # Determine version
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          
          # Create the DMG
          hdiutil create -volname "CPU Identifier" \
            -srcfolder dmg_contents \
            -ov -format UDZO \
            "CPU-Identifier-${VERSION}.dmg"
          
          echo "DMG_NAME=CPU-Identifier-${VERSION}.dmg" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPU-Identifier-DMG
          path: "*.dmg"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          name: CPU Identifier ${{ env.VERSION }}
          body: |
            ## CPU Identifier ${{ env.VERSION }}
            
            ### What's New
            - Support for the latest Apple devices
            - Updated CPU/chip identifiers
            
            ### Supported Devices
            - iPhone (up to iPhone 17)
            - iPad (up to iPad Pro M5)
            - Mac (Apple Silicon M1-M5)
            - Apple Watch (up to Series 11)
            - Apple TV 4K (3rd generation)
            - Apple Vision Pro
            
            ### Installation
            1. Download the DMG file
            2. Open the DMG
            3. Drag "CPU Identifier" to your Applications folder
            
            **Note:** This app requires macOS 10.13 or later. Built for Intel (x86_64) and runs on Apple Silicon via Rosetta 2.
          files: ${{ env.DMG_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
