name: Build and Release DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the release (e.g., 2.0.0)'
        required: true
        default: '2.0.0'

jobs:
  build:
    # Build x86_64 only - MobileDevice.framework does not support arm64
    # Note: Swift files are prepared for future migration but Xcode project
    # still uses Objective-C sources until project configuration is updated
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List available schemes
        run: xcodebuild -list -project "CPU Identifier.xcodeproj"

      - name: Build Mac App (x86_64)
        run: |
          # Cross-compile for x86_64 since MobileDevice.framework doesn't support arm64
          # Note: Swift migration files are prepared but Xcode project needs configuration update
          xcodebuild \
            -project "CPU Identifier.xcodeproj" \
            -scheme "CPU Identifier Mac" \
            -configuration Release \
            -derivedDataPath build \
            -arch x86_64 \
            ARCHS=x86_64 \
            VALID_ARCHS=x86_64 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Find built app
        id: find_app
        run: |
          APP_PATH=$(find build -name "CPU Identifier.app" -type d | head -1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found app at: $APP_PATH"

      - name: Create DMG
        run: |
          # Create a temporary directory for DMG contents
          mkdir -p dmg_contents
          
          # Copy the app to the DMG contents
          cp -R "${{ steps.find_app.outputs.APP_PATH }}" dmg_contents/
          
          # Create a symbolic link to /Applications
          ln -s /Applications dmg_contents/Applications
          
          # Determine version
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          
          # Create the DMG
          hdiutil create -volname "CPU Identifier" \
            -srcfolder dmg_contents \
            -ov -format UDZO \
            "CPU-Identifier-${VERSION}.dmg"
          
          echo "DMG_NAME=CPU-Identifier-${VERSION}.dmg" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPU-Identifier-DMG
          path: "*.dmg"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          name: CPU Identifier ${{ env.VERSION }}
          body: |
            ## CPU Identifier ${{ env.VERSION }}
            
            ### What's New
            - Support for the latest Apple devices
            - Updated CPU/chip identifiers
            - iPhone (up to iPhone 17)
            - iPad (up to iPad Pro M5)
            - Apple Watch (up to Series 11)
            - Apple Vision Pro
            
            ### System Requirements
            - **macOS**: 10.8 or later
            - **Architecture**: x86_64 (Intel or Apple Silicon with Rosetta 2)
            
            ### Installation
            1. Download the DMG file
            2. Open the DMG
            3. Drag "CPU Identifier" to your Applications folder
            
            > ⚠️ **Note**: This version requires Rosetta 2 on Apple Silicon Macs.
            > Swift 2.0 with native Apple Silicon support is in development.
          files: ${{ env.DMG_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
